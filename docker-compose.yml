services:
  # ── Frontend (Vue 3 + Nginx) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      # envsubst подставит в nginx.conf
      AUTH_UPSTREAM: ${AUTH_PROVIDER_URL:-http://backend:8000}
      AUTH_HOST: ${AUTH_HOST:-localhost}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app

  # ── Backend (FastAPI + Claude CLI) ──
  backend:
    build:
      context: ../ai-agents-hub-back
      dockerfile: Dockerfile
    env_file:
      - ../ai-agents-hub-back/.env
    environment:
      # Переопределяем хосты на docker-имена сервисов
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_agent_hub}
      REDIS_URL: redis://redis:6379/0
      CLAUDE_CONFIGS_DIR: /data/claude-configs
      MCP_SERVERS_DIR: /app/mcp-servers
    volumes:
      - claude-configs:/data/claude-configs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - app

  # ── PostgreSQL 16 ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_agent_hub}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app

  # ── Redis 7 ──
  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app

volumes:
  pgdata:
  redisdata:
  claude-configs:

networks:
  app:
    driver: bridge
